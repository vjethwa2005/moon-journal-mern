<h2>Backend Instructions</h2>
<p>Steps to run the Moon Journal backend:</p>
<ol>
    <li>Open terminal in <code>moon-journal/backend</code></li>
    <li>Ensure MongoDB is running locally or configured in <code>.env</code></li>
    <li>Run <code>npm install</code> (if not already installed)</li>
    <li>Run <code>npm start</code> or <code>node server.js</code> to launch backend</li>
</ol>
